name: Release

# Triggers:
#   - Push a tag matching v*.*.* (e.g. v1.2.0)        → builds + publishes a release
#   - workflow_dispatch (manual via the Actions tab)  → builds without publishing,
#                                                       useful for smoke-testing CI changes
#
# How to ship a new firmware version:
#   1. Bump anything you need in the codebase, commit, push to main.
#   2. Tag the commit:  git tag v1.2.0 && git push origin v1.2.0
#   3. Watch the run on GitHub → Actions.  In ~3 minutes it'll attach
#      FPVRaceOne-firmware.bin and FPVRaceOne-littlefs.bin to the new release.
#   4. Devices in the field will see the release on their next "Check for Updates".

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write   # required for action-gh-release to create the release

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full history + tags so extra_script.py's `git describe` works for
          # manual workflow_dispatch runs (tag pushes set GITHUB_REF_NAME and
          # don't actually need this, but it's harmless).
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO + pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini', 'targets/**.ini') }}

      - name: Install PlatformIO
        run: |
          set -x
          python -m pip install --upgrade pip
          # Pin to a known-good PIO version.  Using `pip install platformio`
          # without a constraint silently picks up whatever was released most
          # recently, which has caused surprise behaviour changes (e.g. default
          # target shifts) in CI.  Bump this deliberately when needed.
          pip install "platformio>=6.1,<7.0"
          pio --version

      - name: Determine version
        id: version
        run: |
          # Just for the release name / artifact name / build log.  The actual
          # FIRMWARE_VERSION constant is injected automatically by
          # scripts/extra_script.py (it reads GITHUB_REF_NAME during the build).
          REF_NAME="${GITHUB_REF_NAME:-manual}"
          if [[ "$REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            VERSION="${REF_NAME#v}"
          else
            VERSION="0.0.0-${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$REF_NAME"     >> "$GITHUB_OUTPUT"
          echo "Building FIRMWARE_VERSION=$VERSION (tag=$REF_NAME)"

      - name: Build firmware
        run: |
          set -x
          # No -t: invokes the default target which is the firmware build.
          # The platform has no `build` or `buildprog` name to pass via -t —
          # passing one would either be silently ignored (which is exactly
          # what happened on a previous attempt with `-t buildprog`) or skip
          # the firmware build entirely.
          pio run -e seeed_xiao_esp32c6
          echo "----- contents of .pio/build/seeed_xiao_esp32c6/ -----"
          ls -la .pio/build/seeed_xiao_esp32c6/
          test -s .pio/build/seeed_xiao_esp32c6/firmware.bin \
            || { echo "::error::firmware.bin missing or empty after firmware build"; exit 1; }
          # Stash firmware.bin in /tmp so the next step (buildfs) can't lose it.
          # On Linux, `pio run -t buildfs` was observed to clean the env build
          # dir before producing littlefs.bin — wiping firmware.bin in the
          # process.  Stashing and restoring around buildfs is the most robust
          # defence without having to surgically rework extra_script.py.
          cp .pio/build/seeed_xiao_esp32c6/firmware.bin /tmp/fw-stash.bin
          echo "Stashed firmware.bin to /tmp/fw-stash.bin"

      - name: Build filesystem image
        run: |
          set -x
          pio run -e seeed_xiao_esp32c6 -t buildfs
          echo "----- contents of .pio/build/seeed_xiao_esp32c6/ -----"
          ls -la .pio/build/seeed_xiao_esp32c6/
          test -s .pio/build/seeed_xiao_esp32c6/littlefs.bin \
            || { echo "::error::littlefs.bin missing or empty after pio buildfs"; exit 1; }
          # Restore firmware.bin if buildfs cleaned it.  We verify the stash
          # exists first so the "::error::" message in the next test reflects
          # the right failure mode if something has gone really sideways.
          if [ ! -s .pio/build/seeed_xiao_esp32c6/firmware.bin ]; then
            test -s /tmp/fw-stash.bin \
              || { echo "::error::firmware.bin gone AND stash missing — build is in an unrecoverable state"; exit 1; }
            cp /tmp/fw-stash.bin .pio/build/seeed_xiao_esp32c6/firmware.bin
            echo "Restored firmware.bin from /tmp/fw-stash.bin (buildfs wiped it)"
          fi
          test -s .pio/build/seeed_xiao_esp32c6/firmware.bin \
            || { echo "::error::firmware.bin still missing after restore attempt"; exit 1; }

      - name: Stage release assets
        run: |
          set -x
          mkdir -p release-assets
          cp .pio/build/seeed_xiao_esp32c6/firmware.bin  release-assets/FPVRaceOne-firmware.bin
          cp .pio/build/seeed_xiao_esp32c6/littlefs.bin  release-assets/FPVRaceOne-littlefs.bin
          echo "----- staged assets -----"
          ls -la release-assets/
          # Sanity: print firmware size (must fit in the 1.5 MB OTA app slot)
          stat --printf "firmware.bin: %s bytes\n" release-assets/FPVRaceOne-firmware.bin
          stat --printf "littlefs.bin: %s bytes\n" release-assets/FPVRaceOne-littlefs.bin

      - name: Diagnostics on failure
        if: failure()
        run: |
          echo "===== build dir tree ====="
          find .pio/build -maxdepth 4 -type f -printf '%p (%s bytes)\n' 2>/dev/null | sort
          echo ""
          echo "===== generated headers ====="
          test -f lib/CONFIG/firmware_version.h && cat lib/CONFIG/firmware_version.h || echo "(missing)"
          test -f lib/WEBSERVER/build_timestamp.h && cat lib/WEBSERVER/build_timestamp.h || echo "(missing)"
          echo ""
          echo "===== platformio.ini + targets ====="
          cat platformio.ini
          ls -la targets/ && cat targets/*.ini

      - name: Upload build artifacts (always, for inspection)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FPVRaceOne-${{ steps.version.outputs.version }}
          path: release-assets/
          retention-days: 30
          if-no-files-found: warn

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          # Tags with a `-` after the version triple (e.g. v0.1.2-beta.1)
          # are pushed by the `publish_prerelease` PIO target.  Flag them as
          # GitHub Pre-releases so they're excluded from /releases/latest —
          # the device's "Check for Updates" only sees them as upgrades when
          # the user is on a same-or-older non-stable build.
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          files: |
            release-assets/FPVRaceOne-firmware.bin
            release-assets/FPVRaceOne-littlefs.bin
